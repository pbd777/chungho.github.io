<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVAS-Factory · 에디터</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">

    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-left">
        <span class="logo-mark">▣</span>
        <span class="title">IVAS-Factory</span>
      </div>
      <div class="top-center">
        <button class="view-btn" data-cam="top">상단뷰</button>
        <button class="view-btn" data-cam="front">정면뷰</button>
        <button class="view-btn" data-cam="iso">아이소</button>
        <div class="top-divider"></div>
        <button id="editor-toggle-btn" class="view-btn editor-btn">✎ 에디터</button>
      </div>
      <div class="top-right">
        <span id="fps-counter">-- FPS</span>
      </div>
    </header>

    <!-- 3D Viewport (플로팅 패널들도 여기 안에 들어감) -->
    <div id="viewport">
      <canvas id="c"></canvas>

      <!-- 에디터 툴바 -->
      <div id="editor-bar" class="hidden">
        <div class="ebar-left">
          <button class="mode-btn active" data-mode="translate" title="이동 (W)">
            <svg width="13" height="13" viewBox="0 0 14 14"><path d="M7 1v12M1 7h12M7 1l-2 3h4L7 1zM7 13l-2-3h4l-2 3zM1 7l3-2v4L1 7zM13 7l-3-2v4l3-2z" fill="currentColor"/></svg>
            이동 <kbd>1</kbd>
          </button>
          <button class="mode-btn" data-mode="rotate" title="회전 (E)">
            <svg width="13" height="13" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M11 5l1 2 2-1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
            회전 <kbd>2</kbd>
          </button>
          <button class="mode-btn" data-mode="scale" title="스케일 (R)">
            <svg width="13" height="13" viewBox="0 0 14 14"><rect x="5" y="5" width="4" height="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M2 2l3 3M12 2l-3 3M2 12l3-3M12 12l-3-3" stroke="currentColor" stroke-width="1.2"/></svg>
            스케일 <kbd>3</kbd>
          </button>
          <div class="ebar-divider"></div>
          <button id="snap-btn" class="mode-btn" title="스냅 토글 (X)">
            <svg width="13" height="13" viewBox="0 0 14 14"><path d="M2 2h4v4H2zM8 8h4v4H8z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            스냅 <kbd>4</kbd>
          </button>
          <div class="ebar-divider"></div>
          <button id="anno-add-btn" class="mode-btn" title="Annotation 추가 (클릭해서 씬에 배치)">
            <svg width="13" height="13" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><text x="7" y="11" text-anchor="middle" font-size="7" fill="currentColor">+</text></svg>
            Annotation
          </button>
          <div class="ebar-divider"></div>
          <button id="undo-btn" class="mode-btn" disabled title="되돌릴 내용 없음">
            <svg width="13" height="13" viewBox="0 0 14 14"><path d="M3 7 A4 4 0 1 1 7 11" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 5l2 2 2-2" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            실행취소 <kbd>Ctrl+Z</kbd>
          </button>
        </div>
        <div class="ebar-right">
          <button id="load-btn" class="ebar-btn load">
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 9h10M6 1v7M3 5l3-4 3 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            불러오기
          </button>
          <button id="save-btn" class="ebar-btn save">
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 3h10v8H1zM4 1v3h4V1M4 7h4v4H4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
            저장
          </button>
        </div>
      </div>

      <!-- 로딩 오버레이 -->
      <div id="loading-overlay">
        <div class="loading-inner">
          <div class="loading-ring"></div>
          <div class="loading-label">모델 로딩 중…</div>
          <div class="loading-files" id="loading-files"></div>
        </div>
      </div>
    </div>

    <!-- 알람 -->
    <div id="alert-box"></div>

    <!-- 힌트바 -->
    <div id="hint-bar">
      <span id="hint-normal">우클릭드래그: 회전 &nbsp;·&nbsp; 중클릭드래그: 이동 &nbsp;·&nbsp; 휠: 줌 &nbsp;·&nbsp; 우클릭+WASD: 비행이동 &nbsp;·&nbsp; F: 선택오브젝트 포커스</span>
      <span id="hint-editor" class="hidden">1: 이동 &nbsp;·&nbsp; 2: 회전 &nbsp;·&nbsp; 3: 스케일 &nbsp;·&nbsp; 4: 스냅 &nbsp;·&nbsp; ESC: 선택 해제 &nbsp;·&nbsp; Ctrl+Z: 실행취소</span>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
